# CaMeL Community — 一键开发环境
#
# 启动:  docker compose -f docker-compose.dev.yml up --build
# 停止:  docker compose -f docker-compose.dev.yml down
# 清数据: docker compose -f docker-compose.dev.yml down -v
#
# 前端:  http://localhost:5173
# 后端:  http://localhost:8000/api/docs

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: camel_db
      POSTGRES_USER: camel
      POSTGRES_PASSWORD: camel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U camel -d camel_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      MEILI_MASTER_KEY: masterKey
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      SECRET_KEY: dev-insecure-secret-key-change-in-prod
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DB_NAME: camel_db
      DB_USER: camel
      DB_PASSWORD: camel
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_KEY: masterKey
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
      CSRF_TRUSTED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
      FRONTEND_URL: "http://localhost:5173"
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/.venv            # keep container venv, don't overlay with host
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      SECRET_KEY: dev-insecure-secret-key-change-in-prod
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DB_NAME: camel_db
      DB_USER: camel
      DB_PASSWORD: camel
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_KEY: masterKey
    volumes:
      - ./backend:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker -l info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules     # keep container node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
