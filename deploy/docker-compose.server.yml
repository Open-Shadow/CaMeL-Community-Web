# docker-compose.yml for server deployment (pulls pre-built images from ghcr.io)
# Synced to ~/camel-deploy/docker-compose.yml on the server by GitHub Actions

services:
  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?MEILI_MASTER_KEY must be set}
    volumes:
      - meilisearch_data:/meili_data

  backend: &backend_base
    image: ghcr.io/open-shadow/camel-backend:latest
    env_file:
      - ./backend.prod.env
    depends_on:
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    restart: unless-stopped

  worker:
    <<: *backend_base
    command: ["celery", "-A", "config", "worker", "-l", "info"]

  beat:
    <<: *backend_base
    command: ["celery", "-A", "config", "beat", "-l", "info", "--schedule=/tmp/celerybeat-schedule"]

  frontend:
    image: ghcr.io/open-shadow/camel-frontend:latest
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8293:80"
    volumes:
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
    restart: unless-stopped

volumes:
  redis_data:
  meilisearch_data:
  static_data:
  media_data:
