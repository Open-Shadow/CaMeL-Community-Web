# docker-compose.yml for server deployment (pulls pre-built images from ghcr.io)
# Place this at ~/camel-deploy/docker-compose.yml on the server

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-camel_db}
      POSTGRES_USER: ${POSTGRES_USER:-camel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-camel} -d ${POSTGRES_DB:-camel_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:latest
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey}
    volumes:
      - meilisearch_data:/meili_data

  backend: &backend_base
    image: ghcr.io/open-shadow/camel-backend:latest
    env_file:
      - ./backend.prod.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    restart: unless-stopped

  worker:
    <<: *backend_base
    command: ["celery", "-A", "config", "worker", "-l", "info"]

  beat:
    <<: *backend_base
    command: ["celery", "-A", "config", "beat", "-l", "info"]

  frontend:
    image: ghcr.io/open-shadow/camel-frontend:latest
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:80"
    volumes:
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  static_data:
  media_data:
